<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background: linear-gradient(135deg,#ff9a9e,#fecfef);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.page{
display:none;
text-align:center;
}

.active{
display:block;
}

.card{
background:white;
padding:40px;
border-radius:25px;
width:350px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

input{
width:80%;
padding:12px;
border-radius:20px;
border:1px solid #ccc;
margin-top:15px;
font-size:16px;
text-align:center;
outline:none;
}

button{
margin-top:20px;
background:#ff4da6;
border:none;
padding:12px 30px;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.birthday-title{
font-size:38px;
color:#ff2e93;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.message{
margin-top:20px;
font-size:18px;
line-height:1.7;
color:#444;
min-height:120px;
}

.balloon{
position:absolute;
bottom:-100px;
font-size:35px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{bottom:-100px}
100%{bottom:110%}
}

.heart{
position:absolute;
font-size:20px;
animation:heartFloat 6s linear infinite;
}

@keyframes heartFloat{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-600px);opacity:0}
}

</style>
</head>

<body>

<div class="page active" id="page1">

<div class="card">

<h2>🎁 Birthday Surprise</h2>

<p>Enter your name</p>

<input type="text" id="nameInput" placeholder="Enter your name">

<br>

<button onclick="showWish()">Open Surprise</button>

</div>

</div>


<div class="page" id="page2">

<div class="card">

<h1 class="birthday-title" id="birthdayTitle"></h1>

<p class="message" id="message"></p>

</div>

</div>


<div class="balloon" style="left:10%">🎈</div>
<div class="balloon" style="left:30%">🎈</div>
<div class="balloon" style="left:50%">🎈</div>
<div class="balloon" style="left:70%">🎈</div>
<div class="balloon" style="left:90%">🎈</div>


<script>

function showWish(){

let name=document.getElementById("nameInput").value

if(name==""){
alert("Please enter your name")
return
}

document.getElementById("page1").classList.remove("active")
document.getElementById("page2").classList.add("active")

document.getElementById("birthdayTitle").innerHTML=
"🎉 Happy Birthday "+name+" 🎉"

let text=`എന്റെ ജീവിതത്തിൽ ഒരുപാട് ആളുകൾ വന്നിട്ടുണ്ട്...
പക്ഷേ സുഹൃത്ത് ആയി വന്നിട്ട് സഹോദരനായി മാറിയ ഒരാൾ നീയാണ്.

രക്തബന്ധമില്ലെങ്കിലും നീ എനിക്ക് ഒരു സഹോദരനാണ്.

എന്റെ സന്തോഷത്തിലും പ്രയാസങ്ങളിലും എപ്പോഴും കൂടെയുണ്ടായതിന് നന്ദി.

നിന്റെ ജീവിതം എന്നും സന്തോഷവും വിജയവും നിറഞ്ഞതാകട്ടെ.

ഹാപ്പി ബർത്ത്ഡേ ബ്രോ ❤️🎂`

let i=0
let speed=40

function typing(){

if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i)
i++
setTimeout(typing,speed)
}

}

typing()

createHearts()

}

function createHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"
heart.style.bottom="0"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

},500)

}

</script>

</body>
</html>
